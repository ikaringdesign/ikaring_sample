<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>징어링 커미션</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:#fff;color:#222;}
button{font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

:root{
  --orange:#FF6B1A;
  --orange-light:#FFF3EC;
  --teal:#4BBFCE;
  --dark:#222;
  --gray:#888;
  --line:#E8E8E8;
}

.page{max-width:960px;margin:0 auto;background:#fff;position:relative;}

/* ════════════════════════════════════
   1. 포트폴리오 상단 슬라이더 (1행 슬라이드)
════════════════════════════════════ */
.thumb-slider{position:relative;overflow:hidden;background:#111;height:260px;}
.thumb-track{display:flex;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.thumb-cell{flex:0 0 33.333%;height:100%;overflow:hidden;cursor:pointer;position:relative;}
.thumb-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.thumb-cell:hover img{transform:scale(1.04);}
.thumb-loading{height:260px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#bbb;font-size:13px;background:#111;}
.thumb-prev,.thumb-next{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;z-index:2;cursor:pointer;transition:background .15s;}
.thumb-prev:hover,.thumb-next:hover{background:rgba(255,255,255,.35);}
.thumb-prev{left:12px;} .thumb-next{right:12px;}

/* ════════════════════════════════════
   2. 메인 배너
════════════════════════════════════ */
.main-banner{width:100%;line-height:0;}
.main-banner img{width:100%;display:block;}

/* ════════════════════════════════════
   3. NOTICE
════════════════════════════════════ */
.notice-section{padding:36px 24px 32px;border-top:1px solid #f0f0f0;}
.section-title{
  text-align:center;
  font-size:20px;font-weight:900;
  letter-spacing:.12em;color:#222;
  margin-bottom:24px;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.section-title::before,.section-title::after{content:'+ ';color:#FF6B1A;font-size:14px;font-weight:700;}

.notice-box{
  background:#fff;
  border:1.5px solid var(--line);
  border-radius:4px;
  padding:24px 28px;
}
.notice-item{
  text-align:center;
  font-size:13px;line-height:1.9;
  color:#333;
  padding:10px 0;
  border-bottom:1px solid #f5f5f5;
}
.notice-item:last-child{border-bottom:none;}
.notice-item strong{color:#FF6B1A;}
.notice-item .hl-blue{color:#3B8BFF;font-weight:700;}
.notice-item .hl-orange{color:#FF6B1A;font-weight:700;}

/* ════════════════════════════════════
   4. OPTION 섹션
════════════════════════════════════ */
.option-section{padding:36px 24px 32px;border-top:1px solid #f0f0f0;}
.option-badge{
  display:block;text-align:center;
  background:#FF6B1A;color:#fff;
  font-size:12px;font-weight:900;letter-spacing:.14em;
  padding:6px 0;border-radius:3px;
  max-width:120px;margin:0 auto 28px;
}
.single-badge{
  display:block;text-align:center;
  font-size:11px;font-weight:700;letter-spacing:.14em;color:#FF6B1A;
  margin-bottom:18px;
  display:flex;align-items:center;gap:8px;justify-content:center;
}
.single-badge::before,.single-badge::after{content:'';flex:1;height:1px;background:#FF6B1A;max-width:80px;opacity:.3;}

.opt-group{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}

.opt-card{border:1.5px solid var(--line);border-radius:4px;padding:16px 12px 14px;text-align:center;position:relative;transition:border-color .2s,box-shadow .2s,transform .18s;cursor:default;}
.opt-card:hover{border-color:#FF6B1A;box-shadow:0 6px 20px rgba(255,107,26,.14);transform:translateY(-3px);}
.opt-card:hover::before,.opt-card:hover::after{border-color:#FF6B1A;}
.opt-card:hover .opt-card-type{color:#FF6B1A;}
.opt-card::before,.opt-card::after{content:'';position:absolute;width:10px;height:10px;border-color:#ccc;border-style:solid;}
.opt-card::before{top:5px;left:5px;border-width:1.5px 0 0 1.5px;}
.opt-card::after{bottom:5px;right:5px;border-width:0 1.5px 1.5px 0;}
.opt-card-type{font-size:10px;font-weight:700;letter-spacing:.1em;color:#aaa;margin-bottom:3px;transition:color .2s;}
.opt-card-name{font-size:14px;font-weight:900;color:#222;margin-bottom:5px;}
.opt-card-price{font-size:20px;font-weight:900;color:#FF6B1A;margin-bottom:8px;letter-spacing:-.5px;}
.opt-card-img{width:100%;background:#f5f5f5;border-radius:4px;margin-bottom:8px;display:block;overflow:hidden;}
.opt-card-img img{width:100%;height:auto;display:block;}
.opt-card-img svg{opacity:.25;display:block;margin:16px auto;}
.opt-card-desc{font-size:10.5px;color:#666;line-height:1.65;}
.opt-card-desc small{display:block;font-size:10px;color:#aaa;margin-top:2px;}

.opt-sub{
  border:1.5px solid #f0e8e0;border-radius:4px;
  padding:10px 12px;
  background:#FFF9F5;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  position:relative;
  transition:border-color .2s,background .2s,transform .15s;
  cursor:pointer;
}
.opt-sub:hover{border-color:#FF6B1A;background:#fff4ec;transform:translateY(-1px);}
.opt-sub.span2{grid-column:span 2;}
.opt-sub.span3{grid-column:span 3;}
.opt-sub-name{font-size:12px;font-weight:700;color:#444;line-height:1.4;}
.opt-sub-note{font-size:10.5px;color:#aaa;margin-top:2px;}
.opt-sub-price{font-size:14px;font-weight:900;color:#FF6B1A;white-space:nowrap;flex-shrink:0;}

.opt-sub-multi{
  border:1.5px solid #f0e8e0;border-radius:4px;
  padding:4px 14px;background:#FFF9F5;
  grid-column:span 2;
  transition:border-color .2s,background .2s;
}
.opt-sub-multi:hover{border-color:#FFD4B0;}
.opt-sub-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 0;border-bottom:1px solid #f0e8e0;cursor:pointer;transition:background .15s;border-radius:3px;}
.opt-sub-row:last-child{border-bottom:none;}
.opt-sub-row:hover{background:#fff4ec;}
.opt-sub-row-name{font-size:12px;font-weight:600;color:#444;}
.opt-sub-row-note{font-size:10.5px;color:#aaa;}
.opt-sub-row-price{font-size:13.5px;font-weight:900;color:#FF6B1A;white-space:nowrap;flex-shrink:0;}

.opt-card.selected{border-color:#FF6B1A;background:#FFF4EC;box-shadow:0 4px 16px rgba(255,107,26,.18);}
.opt-card.selected::before,.opt-card.selected::after{border-color:#FF6B1A;}
.opt-card.selected .opt-card-type{color:#FF6B1A;}
.opt-card.selected .opt-card-name{color:#FF6B1A;}
.opt-card-check{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;border:1.5px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .2s;}
.opt-card.selected .opt-card-check{background:#FF6B1A;border-color:#FF6B1A;color:#fff;}
.opt-sub.selected,.opt-sub-row.selected{background:#FFF0E6 !important;border-color:#FF6B1A !important;}
.opt-sub.selected .opt-sub-name,.opt-sub-row.selected .opt-sub-row-name{color:#FF6B1A;font-weight:700;}

.selected-preview{
  display:flex;flex-wrap:wrap;gap:6px;
  min-height:32px;padding:8px 12px;
  background:#FFF9F5;border:1.5px solid #FFD4B0;
  border-radius:4px;margin-bottom:8px;
  align-items:center;
}
.sel-tag{display:inline-flex;align-items:center;gap:5px;
  background:#FF6B1A;color:#fff;
  font-size:11.5px;font-weight:700;
  padding:4px 10px;border-radius:20px;}
.sel-tag button{background:none;border:none;color:#fff;font-size:12px;padding:0;line-height:1;opacity:.8;cursor:pointer;}
.sel-placeholder{font-size:12px;color:#ccc;}

.inq-item{display:flex;flex-direction:column;gap:8px;padding:14px 18px;border-bottom:1px solid #f5f5f5;transition:background .15s;}
.inq-item:last-child{border-bottom:none;}
.inq-item:hover{background:#FFF8F4;}
.inq-item-top{display:grid;grid-template-columns:26px 1fr;align-items:start;gap:12px;}
.inq-num{width:22px;height:22px;border-radius:50%;background:#1a1a1a;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.inq-key{font-size:13px;font-weight:700;color:#222;margin-bottom:2px;}
.inq-extra{font-size:11.5px;color:#aaa;margin-top:2px;}
.inq-input{
  width:100%;padding:9px 12px;
  border:1.5px solid #eee;border-radius:6px;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#222;
  background:#fafafa;outline:none;resize:none;
  transition:border-color .15s;
}
.inq-input:focus{border-color:#FF6B1A;background:#fff;}
.inq-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;min-height:36px;padding:12px;background:#fafafa;border:1.5px solid #eee;border-radius:6px;align-items:center;}
.inq-sel-tag{font-size:13px;}
.opt-instruction{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:20px;
  font-size:13px;font-weight:700;color:#FF6B1A;
  letter-spacing:.06em;
}
.opt-instruction::before,.opt-instruction::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,transparent,#FF6B1A88);
  max-width:60px;
}
.opt-instruction::after{
  background:linear-gradient(to left,transparent,#FF6B1A88);
}

.inq-block-title{
  font-size:15px;font-weight:700;color:#1a1a1a;
  text-align:center;
  padding:6px 0 4px;
  margin-bottom:12px;
}
.inq-block-title span{font-size:11px;color:#aaa;font-weight:400;margin-left:4px;}

.inq-radio-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.inq-radio-btn-wrap{
  width:calc(33.333% - 4px);
  display:flex;flex-direction:column;align-items:stretch;gap:4px;
}
.inq-radio-btn-wrap .inq-radio-btn{width:100%;}
.inq-radio-ex-img{
  width:100%;
  height:auto;
  display:block;
  border-radius:4px;
  border:1px solid #eee;
  background:#f5f5f5;
}
.inq-radio-wide{width:calc(33.333% - 4px)!important;}
.inq-radio-btn{width:calc(33.333% - 4px);padding:8px 6px;border:1.5px solid #e0e0e0;border-radius:4px;background:#fff;font-size:12px;font-weight:600;color:#555;transition:all .15s;cursor:pointer;text-align:center;line-height:1.4;}
.inq-radio-btn:hover{border-color:#FF6B1A;color:#FF6B1A;}
.inq-radio-btn.on{background:#FF6B1A;border-color:#FF6B1A;color:#fff;}
.inq-num.cond{background:#FF6B1A;font-size:16px;font-weight:900;}
.inq-img-area{border:1.5px dashed #ddd;border-radius:6px;padding:13px;text-align:center;cursor:pointer;background:#fafafa;transition:all .15s;}
.inq-img-area:hover{border-color:#FF6B1A;background:#FFF9F5;}
.inq-img-label{font-size:12px;color:#aaa;display:flex;align-items:center;justify-content:center;gap:6px;}
.inq-img-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.inq-img-thumb{width:60px;height:60px;border-radius:5px;overflow:hidden;border:1px solid #eee;position:relative;}
.inq-img-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.inq-img-thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  border:1.5px solid #f0e8e0;border-radius:4px;
  padding:10px 14px;background:#FFF9F5;
  grid-column:span 2;
  transition:border-color .2s,background .2s;
}
.opt-sub-multi:hover{border-color:#FF6B1A;background:#fff4ec;}
.opt-sub-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid #f0e8e0;}
.opt-sub-row:last-child{border-bottom:none;}
.opt-sub-row-name{font-size:12px;font-weight:600;color:#444;}
.opt-sub-row-note{font-size:10.5px;color:#aaa;}
.opt-sub-row-price{font-size:13.5px;font-weight:900;color:#FF6B1A;white-space:nowrap;flex-shrink:0;}

.pkg-badge{
  display:block;text-align:center;
  font-size:11px;font-weight:700;letter-spacing:.14em;color:#FF6B1A;
  display:flex;align-items:center;gap:8px;justify-content:center;
  margin:24px 0 16px;
}
.pkg-badge::before,.pkg-badge::after{content:'';flex:1;height:1px;background:#FF6B1A;max-width:80px;opacity:.3;}

.pkg-card{
  border:1.5px solid var(--line);border-radius:4px;
  padding:16px 18px;
  display:flex;align-items:center;gap:16px;
  margin-bottom:12px;
  position:relative;
  transition:border-color .2s,box-shadow .2s,transform .18s;
  cursor:pointer;
}
.pkg-card-check{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;border:1.5px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .2s;z-index:1;}
.pkg-card.selected .pkg-card-check{background:#FF6B1A;border-color:#FF6B1A;color:#fff;}
.pkg-card:hover{border-color:#FF6B1A;box-shadow:0 6px 24px rgba(255,107,26,.15);transform:translateY(-2px);}
.pkg-card.selected{border-color:#FF6B1A;background:#FFF4EC;box-shadow:0 4px 16px rgba(255,107,26,.18);}
.pkg-card.selected::before,.pkg-card.selected::after{border-color:#FF6B1A;}
.pkg-card::before,.pkg-card::after{
  content:'';position:absolute;
  width:12px;height:12px;
  border-color:#ccc;border-style:solid;
}
.pkg-card::before{top:8px;left:8px;border-width:1.5px 0 0 1.5px;}
.pkg-card::after{bottom:8px;right:8px;border-width:0 1.5px 1.5px 0;}
.pkg-set-badge{
  width:56px;height:56px;border-radius:4px;
  background:#FF6B1A;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;flex-shrink:0;
}
.pkg-set-badge span{font-size:10px;font-weight:700;letter-spacing:.08em;margin-top:-2px;}
.pkg-info{flex:1;}
.pkg-name{font-size:15px;font-weight:900;color:#222;margin-bottom:5px;}
.pkg-benefit{display:inline-flex;align-items:center;gap:6px;margin-bottom:8px;}
.pkg-benefit-label{font-size:11px;font-weight:700;color:#666;}
.pkg-benefit-tag{background:#FF6B1A;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;justify-content:center;line-height:1.4;text-align:center;}
.pkg-prices{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.pkg-sale-tag{font-size:10px;font-weight:700;letter-spacing:.06em;color:#FF6B1A;background:#FFF3EC;padding:2px 8px;border-radius:3px;margin-bottom:2px;text-align:right;}
.pkg-original{font-size:12px;color:#bbb;text-decoration:line-through;text-align:right;}
.pkg-final{font-size:22px;font-weight:900;color:#FF6B1A;letter-spacing:-.5px;text-align:right;}
.pkg-event{
  background:#FF6B1A;color:#fff;
  font-size:12px;font-weight:700;
  padding:5px 14px;border-radius:3px;
  margin-top:6px;
  letter-spacing:.04em;
}
.pkg-card-inner{display:flex;align-items:center;gap:16px;flex:1;}
.pkg-right{display:flex;flex-direction:column;align-items:flex-end;}

.opt-note{
  background:#f9f9f9;border-radius:4px;
  padding:12px 16px;
  font-size:12px;color:#666;line-height:1.75;
  margin-top:10px;
  text-align:center;
}
.opt-note strong{color:#222;}

/* ════════════════════════════════════
   문의 양식
════════════════════════════════════ */
.inquiry-section{padding:36px 24px 32px;border-top:1px solid #f0f0f0;}
.inq-wrap{border:1.5px solid var(--line);border-radius:4px;overflow:hidden;position:relative;}
.inq-wrap::before,.inq-wrap::after{content:'';position:absolute;width:14px;height:14px;border-color:#FF6B1A;border-style:solid;opacity:.45;z-index:1;pointer-events:none;}
.inq-wrap::before{top:8px;left:8px;border-width:1.5px 0 0 1.5px;}
.inq-wrap::after{bottom:8px;right:8px;border-width:0 1.5px 1.5px 0;}
.inq-tags-wrap{display:flex;flex-direction:column;gap:10px;}
.inq-tags{display:flex;flex-wrap:wrap;gap:7px;min-height:36px;padding:10px 12px;background:#fafafa;border:1.5px solid #eee;border-radius:6px;align-items:center;}
.inq-tag-empty{font-size:12px;color:#ccc;}
.inq-sel-tag{display:inline-flex;align-items:center;gap:5px;background:#FF6B1A;color:#fff;font-size:12px;font-weight:600;padding:5px 10px 5px 12px;border-radius:4px;line-height:1.3;}
.inq-sel-del{background:none;border:none;color:rgba(255,255,255,.75);font-size:13px;cursor:pointer;padding:0;line-height:1;display:flex;align-items:center;transition:color .15s;}
.inq-sel-del:hover{color:#fff;}
.inq-total{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:8px 12px;background:#FFF4EC;border-radius:6px;border:1.5px solid #FFD4B0;}
.inq-total-label{font-size:12px;font-weight:700;color:#c85000;}
.inq-total-price{font-size:18px;font-weight:900;color:#FF6B1A;letter-spacing:-.5px;}

.inq-discount-btn{width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:6px;background:#fff;font-size:13px;font-weight:600;color:#555;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s;text-align:left;}
.inq-discount-btn:hover{border-color:#FF6B1A;color:#FF6B1A;}
.inq-discount-btn.on{border-color:#FF6B1A;background:#FFF4EC;color:#FF6B1A;}
.inq-discount-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #ccc;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;transition:all .2s;}
.inq-discount-btn.on .inq-discount-check{background:#FF6B1A;border-color:#FF6B1A;color:#fff;}

.inq-prod-section{padding:16px 18px;border-bottom:1px solid #f0f0f0;}
.inq-block-title{font-size:12px;font-weight:700;color:#1a1a1a;letter-spacing:.05em;margin-bottom:10px;}
.inq-block-title span{font-size:11px;color:#aaa;font-weight:400;margin-left:4px;}
.inq-prod-grid{display:flex;flex-wrap:wrap;gap:6px;}
.inq-prod-btn{padding:7px 11px;border:1.5px solid #e0e0e0;border-radius:4px;background:#fff;font-size:12px;font-weight:600;color:#555;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .15s;line-height:1.3;cursor:pointer;}
.inq-prod-btn:hover{border-color:#FF6B1A;color:#FF6B1A;}
.inq-prod-btn.on{background:#FF6B1A;border-color:#FF6B1A;color:#fff;}
.inq-prod-btn .ipb-price{font-size:10px;font-weight:400;opacity:.7;}
.inq-prod-btn.on .ipb-price{opacity:.85;}
.inq-item{display:flex;flex-direction:column;gap:9px;padding:14px 18px;border-bottom:1px solid #f5f5f5;transition:background .15s;}
.inq-item:last-child{border-bottom:none;}
.inq-item:hover{background:#FFF8F4;}
.inq-item-top{display:flex;align-items:center;gap:10px;}
.inq-num{width:22px;height:22px;border-radius:50%;background:#1a1a1a;color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.inq-num.cond{background:#FF6B1A;font-size:16px;font-weight:900;}
.inq-key{font-size:13px;font-weight:700;color:#222;}
.inq-cond-sec{background:#FFF9F5;border-left:3px solid #FF6B1A;}
.inq-cond-sec:hover{background:#FFF4EC;}
.inq-sub-label{font-size:11.5px;font-weight:700;color:#777;margin:2px 0 6px;}
.inq-radio-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.inq-radio-btn{padding:7px 13px;border:1.5px solid #e0e0e0;border-radius:4px;background:#fff;font-size:12px;font-weight:600;color:#555;transition:all .15s;cursor:pointer;text-align:left;}
.inq-radio-btn:hover{border-color:#FF6B1A;color:#FF6B1A;}
.inq-radio-btn.on{background:#FF6B1A;border-color:#FF6B1A;color:#fff;}

<script>
/* ── NOTICE ── */
const nb=document.getElementById('notice-box');
NOTICE_ITEMS.forEach(item=>{
  const d=document.createElement('div');d.className='notice-item';d.innerHTML=item;nb.appendChild(d);
});

const selectedItems = new Map();

function updateSelectedField(){
  const el = document.getElementById('inq-input-2');
  if(el){ el.value = [...selectedItems.values()].map(v=>v.name).join(', '); }
  const preview = document.getElementById('selected-preview');
  if(preview){
    preview.innerHTML = '';
    if(!selectedItems.size){
      preview.innerHTML = '<span class="sel-placeholder">상품을 클릭하면 여기에 표시됩니다</span>';
    } else {
      [...selectedItems.entries()].forEach(([k,v])=>{
        const tag = document.createElement('span');
        tag.className = 'sel-tag';
        tag.textContent = v.name+' ';
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.onclick = ()=>removeSelected(k);
        tag.appendChild(btn);
        preview.appendChild(tag);
      });
    }
  }
  if(typeof window.renderInqTags==='function') window.renderInqTags();
}
function removeSelected(key){
  selectedItems.delete(key);
  document.querySelectorAll('[data-sel-key]').forEach(el=>{
    if(el.dataset.selKey===key) el.classList.remove('selected');
  });
  updateSelectedField();
}
function toggleSelect(el,key,name){
  if(selectedItems.has(key)){ selectedItems.delete(key); el.classList.remove('selected'); }
  else{ selectedItems.set(key,{name}); el.classList.add('selected'); }
  updateSelectedField();
}

const OPT_IMGS = {
  'OVERLAY_채팅화면':                          'image/opt_chat.png',
  'OVERLAY_게임화면':                          'image/opt_game.png',
  'SCHEDULE_스케줄표':                         'image/opt_schedule.png',
  'POSTER_RT포스터':                           'image/opt_rt.png',
  'POSTER_메인포스터':                         'image/opt_mainposter.png',
  'THUMBNAIL_가로 썸네일':                     'image/opt_thumbnail.png',
  'CSS_CSS디자인+적용\n심플 디자인':           'image/opt_css_simple.png',
  'CSS_CSS디자인+적용\n닉네임 디자인':    'image/opt_css_name.png',
};

function makeCard(type,name,price,desc,sub){
  const key=type+'_'+name;
  const imgSrc = OPT_IMGS[key] || null;
  const d=document.createElement('div'); d.className='opt-card'; d.dataset.selKey=key; d.style.cursor='pointer';
  d.innerHTML=`<div class="opt-card-check">✓</div>
    <div class="opt-card-type">${type}</div>
    <div class="opt-card-name">${name.replace(/\n/g,'<br>')}</div>
    <div class="opt-card-price">${price}</div>
    <div class="opt-card-img">${imgSrc
      ? `<img src="${imgSrc}" alt="${name}" onerror="this.parentElement.innerHTML='<svg width=\\'44\\' height=\\'32\\' viewBox=\\'0 0 44 32\\'><rect x=\\'1\\' y=\\'1\\' width=\\'42\\' height=\\'30\\' rx=\\'3\\' fill=\\'none\\' stroke=\\'#ddd\\' stroke-width=\\'1.5\\'/><line x1=\\'1\\' y1=\\'1\\' x2=\\'43\\' y2=\\'31\\' stroke=\\'#e8e8e8\\'/><line x1=\\'43\\' y1=\\'1\\' x2=\\'1\\' y2=\\'31\\' stroke=\\'#e8e8e8\\'/></svg>'">`
      : `<svg width="44" height="32" viewBox="0 0 44 32"><rect x="1" y="1" width="42" height="30" rx="3" fill="none" stroke="#ddd" stroke-width="1.5"/><line x1="1" y1="1" x2="43" y2="31" stroke="#e8e8e8"/><line x1="43" y1="1" x2="1" y2="31" stroke="#e8e8e8"/></svg>`
    }</div>
    ${desc?`<div class="opt-card-desc">${desc.replace(/\n/g,'<br>')}${sub?`<small>${sub}</small>`:''}</div>`:''}`;
  d.onclick=()=>toggleSelect(d,key,`${name.replace(/\n/g,' ')} (${price})`);
  return d;
}
function makeSub(name,price,span,note){
  const key='sub_'+name;
  const d=document.createElement('div'); d.className='opt-sub'+(span===2?' span2':span===3?' span3':''); d.dataset.selKey=key;
  d.innerHTML=`<div><div class="opt-sub-name">${name}</div>${note?`<div class="opt-sub-note">${note}</div>`:''}</div><div class="opt-sub-price">+ ${price}</div>`;
  d.onclick=()=>toggleSelect(d,key,`${name} (+${price})`);
  return d;
}

(function(){
  const g=document.getElementById('opt-group-1');
  g.appendChild(makeCard('OVERLAY','채팅화면','220,000','채팅화면용 CSS 디자인 포함됩니다.','(CSS 적용은 별도 구매 필요)'));
  g.appendChild(makeCard('OVERLAY','게임화면','140,000','일반·풀화면 2종 제공됩니다.<br>게임화면용 CSS 디자인 포함됩니다.','(CSS 적용은 별도 구매 필요)'));

const PROXIES=['','https://api.allorigins.win/raw?url=','https://corsproxy.io/?'];
function splitLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){if(l[i]==='"')q=!q;else if(l[i]===','&&!q){r.push(c);c='';}else c+=l[i];}r.push(c);return r;}
function parseCSV(txt){
  const rows=txt.trim().split(/\r?\n/);if(rows.length<2)return[];
  const hdrs=splitLine(rows[0]);
  return rows.slice(1).map(r=>{const cols=splitLine(r);const o={};hdrs.forEach((h,i)=>{o[h.trim()]=(cols[i]||'').trim().replace(/^"|"$/g,'');});return o;})
    .filter(r=>r['공개']!=='N'&&r['이미지URL']);
}
async function fetchCSV(){
  let err='';
  for(const p of PROXIES){
    try{
      const url=p?p+encodeURIComponent(SHEET_CSV_URL):SHEET_CSV_URL;
      const res=await fetch(url,{cache:'no-cache'});
      if(!res.ok)throw new Error('HTTP '+res.status);
      const txt=await res.text();
      if(!txt||txt.length<10)throw new Error('빈 응답');
      return parseCSV(txt);
    }catch(e){err=e.message;}
  }
  throw new Error(err);
}

function buildThumbSlider(data){
  const slider = document.getElementById('thumb-slider');
  const show = data.slice(0, 9);
  if(!show.length){ slider.innerHTML=''; return; }
  let idx = 0;
  const visible = 3;
  const max = Math.max(0, show.length - visible);

  let html = `<div class="thumb-track" id="thumb-track">`;
  show.forEach((d,i)=>{
    html += `<div class="thumb-cell" data-i="${i}"><img src="${d['이미지URL']}" alt="${d['설명']||''}" loading="lazy"></div>`;
  });
  html += `</div>
    <button class="thumb-prev" id="thumb-prev">‹</button>
    <button class="thumb-next" id="thumb-next">›</button>`;
  slider.innerHTML = html;

  function goSlide(n){
    idx = Math.max(0, Math.min(n, max));
    document.getElementById('thumb-track').style.transform = `translateX(-${idx * (100/visible)}%)`;
  }
  document.getElementById('thumb-prev').onclick = ()=>goSlide(idx-1);
  document.getElementById('thumb-next').onclick = ()=>goSlide(idx+1);

  setInterval(()=>goSlide(idx >= max ? 0 : idx+1), 3500);

  slider.querySelectorAll('.thumb-cell').forEach(cell=>{
    cell.onclick=()=>openLB(parseInt(cell.dataset.i), show);
  });
}

      const n=(document.getElementById('inq-layout-note')||{}).value||''; if(n.trim()) lines.push('  요청: '+n.trim());
    }
    if(document.getElementById('inq-sec-32').style.display!=='none'){
      lines.push('◦ 스케줄표 설정');
      const sz=wrap.querySelector('.inq-radio-btn[data-rg="schedsize"].on'); if(sz) lines.push('  사이즈: '+sz.textContent);
      const sb=wrap.querySelector('.inq-radio-btn[data-rg="schedtype"].on'); if(sb) lines.push('  칸 형식: '+sb.textContent);
      const ib=wrap.querySelector('.inq-radio-btn[data-rg="illpos"].on'); if(ib) lines.push('  일러스트: '+ib.textContent);
      const n=(document.getElementById('inq-sched-note')||{}).value||''; if(n.trim()) lines.push('  요청: '+n.trim());
    }
    if(document.getElementById('inq-sec-33').style.display!=='none'){
      lines.push('◦ CSS 닉네임 정렬');
      const b=wrap.querySelector('.inq-radio-btn[data-rg="nikalign"].on'); if(b) lines.push('  '+b.textContent);
    }
    if(document.getElementById('inq-sec-34').style.display!=='none'){
      lines.push('◦ CSS 채팅 길이');
      const cb=wrap.querySelector('.inq-radio-btn[data-rg="chatlen"].on'); if(cb) lines.push('  '+cb.textContent);
      const ab=wrap.querySelector('.inq-radio-btn[data-rg="chatalign"].on'); if(ab) lines.push('  채팅 정렬: '+ab.textContent);
      const n=(document.getElementById('inq-css-note')||{}).value||''; if(n.trim()) lines.push('  요청: '+n.trim());
    }
    if(document.getElementById('inq-sec-rt').style.display!=='none'){
      lines.push('◦ RT 포스터');
      const sl=(document.getElementById('inq-rt-slots')||{}).value||''; if(sl.trim()) lines.push('  슬롯/RT 수: '+sl.trim());
      const tx=(document.getElementById('inq-rt-text')||{}).value||''; if(tx.trim()) lines.push('  원하는 문구: '+tx.trim());
      const n=(document.getElementById('inq-rt-note')||{}).value||''; if(n.trim()) lines.push('  요청: '+n.trim());
    }
    if(document.getElementById('inq-sec-th').style.display!=='none'){
      lines.push('◦ 가로 썸네일');
      const tx=(document.getElementById('inq-th-text')||{}).value||''; if(tx.trim()) lines.push('  원하는 문구: '+tx.trim());
      const ly=(document.getElementById('inq-th-layout')||{}).value||''; if(ly.trim()) lines.push('  레이아웃: '+ly.trim());
    }
    const etc=(document.getElementById('inq-etc')||{}).value||'';
    lines.push('◦ 그 외 추가 사항'); if(etc.trim()) lines.push('  '+etc.trim());
    lines.push('──────────────');
    const copyText = lines.join('\n');
    function fallbackCopy(text){
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;';
      document.body.appendChild(ta);
      ta.focus({preventScroll: true});
      ta.select();
      let ok = false;
      try{ ok = document.execCommand('copy'); }catch(e){}
      document.body.removeChild(ta);
      return ok;
    }
    const doCopy = async ()=>{
      try{ await navigator.clipboard.writeText(copyText); return true; }
      catch(e){ return fallbackCopy(copyText); }
    };
    doCopy().then(ok=>{
      if(ok){
        this.classList.add('done'); document.getElementById('inq-copy-lbl').textContent='복사 완료!';
        showToast('✅ 문의 양식이 복사되었습니다');
        setTimeout(()=>{this.classList.remove('done');document.getElementById('inq-copy-lbl').textContent='문의 양식 복사하기';},2500);
      } else showToast('복사 실패 — 텍스트를 직접 선택해주세요');
    });
  };
})();
let allData=[],filtered=[],lbData=[],lbIdx=0,curTab='all',curPage=0;
const PER=9;

(function buildTabs(){
  const row=document.getElementById('pf-tabs');
  TABS.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='pf-tab'+(i===0?' on':'');
    b.textContent=t.label;
    b.onclick=function(){
      document.querySelectorAll('.pf-tab').forEach(x=>x.classList.remove('on'));
      this.classList.add('on');curTab=t.key;curPage=0;renderGrid();
    };
    row.appendChild(b);
  });
})();

function renderPromo(show){
  const a=document.getElementById('promo-area');
  if(!show){a.innerHTML='';return;}
  a.innerHTML=`<div class="promo-banner">
    <div><div class="promo-tag">${PROMO.tag}</div>
    <div class="promo-title">${PROMO.title}</div>
    <div class="promo-desc">${PROMO.desc}</div></div>
    <button class="promo-btn" onclick="window.open('${PROMO.btnUrl}','_blank')">${PROMO.btnLabel}</button>
  </div>`;
}

function getSubImages(item){
  const sub=(item['서브이미지']||'').split('|').map(s=>s.trim()).filter(Boolean);
  return[item['이미지URL'],...sub];
}

function renderGrid(){
  renderPromo(curTab==='Schedule');
  filtered=curTab==='all'?allData:allData.filter(d=>d['카테고리']===curTab);
  const body=document.getElementById('pf-body');
  if(!filtered.length){
    body.innerHTML=`<div class="pf-grid"><div class="pf-state">이 카테고리에 작품이 없어요</div></div>`;
    return;
  }
  const total=Math.ceil(filtered.length/PER);
  const start=curPage*PER;
  const items=filtered.slice(start,start+PER);

  const wrap=document.createElement('div');
  const grid=document.createElement('div');grid.className='pf-grid';
  items.forEach((item,i)=>{
    const card=document.createElement('div');card.className='pf-card';
    card.innerHTML=`
      <div class="pf-card-img">
        <img src="${item['이미지URL']}" alt="${item['설명']||''}" loading="lazy">
        ${item['카테고리']?`<div class="pf-cat-badge">${item['카테고리']}</div>`:''}
      </div>`;
    card.onclick=()=>openLB(start+i,filtered);
    grid.appendChild(card);
  });
  wrap.appendChild(grid);

  if(total>1){
    const pag=document.createElement('div');pag.className='pf-paging';
    const prev=document.createElement('button');prev.className='pf-pg arr';prev.textContent='‹';prev.disabled=curPage===0;
    prev.onclick=()=>{if(curPage>0){curPage--;renderGrid();}};pag.appendChild(prev);
    for(let p=0;p<total;p++){
      const btn=document.createElement('button');btn.className='pf-pg'+(p===curPage?' on':'');btn.textContent=p+1;
      (function(pp){btn.onclick=()=>{curPage=pp;renderGrid();};})(p);pag.appendChild(btn);
    }
    const nxt=document.createElement('button');nxt.className='pf-pg arr';nxt.textContent='›';nxt.disabled=curPage>=total-1;
    nxt.onclick=()=>{if(curPage<total-1){curPage++;renderGrid();}};pag.appendChild(nxt);
    wrap.appendChild(pag);
  }
  body.innerHTML='';body.appendChild(wrap);
}

let _lbReady = false;

function injectLB(){
  try{
    const pd = window.parent.document;
    /* 기존 오버레이 제거 후 항상 새로 주입 */
    const old = pd.getElementById('aw-lb-ov');
    if(old) old.parentNode.removeChild(old);

    const ov = pd.createElement('div');
    ov.id = 'aw-lb-ov';
    ov.style.cssText = [
      'display:none',
      'position:fixed',
      'inset:0',
      'z-index:9999999',
      'background:rgba(0,0,0,.25)',
      'align-items:center',
      'justify-content:center',
      'padding:20px',
      'box-sizing:border-box',
      'font-family:sans-serif',
      'cursor:pointer',
    ].join(';') + ';';

    ov.innerHTML =
      '<div id="aw-lb-inner" style="position:relative;background:#fff;border-radius:12px;overflow:hidden;width:min(96vw,1300px);max-height:94vh;display:flex;flex-direction:column;box-shadow:0 32px 100px rgba(0,0,0,.5);cursor:default;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f0f0f0;flex-shrink:0;">' +
          '<div><span id="aw-lb-ttl" style="font-size:14px;font-weight:600;color:#222;"></span>' +
          '<span id="aw-lb-cnt" style="font-size:12px;color:#aaa;margin-left:10px;"></span></div>' +
          '<button id="aw-lb-x" style="width:30px;height:30px;border-radius:50%;border:none;background:#f0f0f0;font-size:17px;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;">&#x2715;</button>' +
        '</div>' +
        '<div style="position:relative;background:#111;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;">' +
          '<button id="aw-lb-prev" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;font-size:26px;color:#fff;cursor:pointer;z-index:2;">&#8249;</button>' +
          '<button id="aw-lb-next" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;font-size:26px;color:#fff;cursor:pointer;z-index:2;">&#8250;</button>' +
          '<img id="aw-lb-img" src="" alt="" style="max-width:100%;max-height:86vh;object-fit:contain;display:block;">' +
        '</div>' +
        '<div id="aw-lb-ftr" style="padding:14px 18px;border-top:1px solid #f0f0f0;background:#fafafa;flex-shrink:0;">' +
          '<div id="aw-lb-thumbs" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;"></div>' +
        '</div>' +
      '</div>';

    pd.body.appendChild(ov);

    pd.getElementById('aw-lb-x').onclick = function(e){ e.stopPropagation(); closeLB(); };

    /* 배경 클릭 닫기 — click + mousedown 둘 다 */
    function checkClose(e){
      const inner = pd.getElementById('aw-lb-inner');
      if(inner && !inner.contains(e.target)){ closeLB(); }
    }
    ov.addEventListener('click', checkClose);
    ov.addEventListener('mousedown', checkClose);

    /* 키보드 */
    pd.addEventListener('keydown', function(e){
      const o = pd.getElementById('aw-lb-ov');
      if(!o || o.style.display==='none') return;
      if(e.key==='Escape')      closeLB();
      if(e.key==='ArrowLeft')   pd.getElementById('aw-lb-prev').click();
      if(e.key==='ArrowRight')  pd.getElementById('aw-lb-next').click();
    });

    _lbReady = true;
    return true;
  }catch(e){ _lbReady = false; return false; }
}

function openLB(i, data){
  lbData = data; lbIdx = i;
  if(injectLB()){
    updLB();
    try{ window.parent.document.getElementById('aw-lb-ov').style.display='flex'; }catch(e){}
  } else {
    const item = data[i];
    const imgs = getSubImages(item);
    const hash = encodeURIComponent(JSON.stringify({imgs, cap:item['설명']||'', idx:i, total:data.length}));
    window.open('https://ikaringdesign.github.io/ikaring_sample/lb.html#'+hash, '_blank');
  }
}

function closeLB(){
  try{ window.parent.document.getElementById('aw-lb-ov').style.display='none'; }catch(e){}
}

function updLB(){
  try{
    const pd = window.parent.document;
    const item = lbData[lbIdx];
    const imgs = getSubImages(item);
    let si = 0;
    pd.getElementById('aw-lb-ttl').textContent = item['설명']||'';
    pd.getElementById('aw-lb-cnt').textContent = (lbIdx+1)+' / '+lbData.length;
    function showSub(n){
      si=((n%imgs.length)+imgs.length)%imgs.length;
      pd.getElementById('aw-lb-img').src=imgs[si];
      pd.querySelectorAll('.aw-lb-th').forEach((t,i)=>{
        t.style.border = i===si ? '2px solid #FF6B1A' : '2px solid transparent';
        t.style.opacity = i===si ? '1' : '0.5';
      });
    }
    const th = pd.getElementById('aw-lb-thumbs');
    if(imgs.length>1){
      th.innerHTML = imgs.map((url,i)=>
        `<div class="aw-lb-th" data-si="${i}" style="flex-shrink:0;width:52px;height:65px;border-radius:4px;overflow:hidden;cursor:pointer;border:2px solid ${i===0?'#FF6B1A':'transparent'};opacity:${i===0?'1':'0.5'};transition:all .18s;"><img src="${url}" style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;"></div>`
      ).join('');
      pd.querySelectorAll('.aw-lb-th').forEach(t=>{ t.onclick=()=>showSub(parseInt(t.dataset.si)); });
      pd.getElementById('aw-lb-ftr').style.display='block';
    }else{ th.innerHTML=''; pd.getElementById('aw-lb-ftr').style.display='none'; }
    pd.getElementById('aw-lb-prev').onclick=()=>showSub(si-1);
    pd.getElementById('aw-lb-next').onclick=()=>showSub(si+1);
    showSub(0);
  }catch(e){}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2800);}

(async function init(){
  try{
    allData=await fetchCSV();
    buildThumbSlider(allData);
    renderGrid();
  }catch(e){
    document.getElementById('thumb-grid').innerHTML='';
    document.getElementById('pf-body').innerHTML=
      `<div class="pf-grid"><div class="pf-state">⚠️ 불러오기 실패 (${e.message})</div></div>`;
  }
  // 높이 전달
  setTimeout(sendHeight, 800);
})();

/* 높이 자동 전달 */
function sendHeight(){
  const h = document.body.scrollHeight + 20;
  try{ window.parent.postMessage({type:'aw-height', h:h}, '*'); }catch(e){}
}
// ResizeObserver — 콘텐츠 변화 즉시 감지
if(window.ResizeObserver){
  new ResizeObserver(function(){ sendHeight(); }).observe(document.body);
} else {
  setInterval(sendHeight, 500);
}
window.addEventListener('load', sendHeight);
</script>
