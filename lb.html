<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이미지 보기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;}
#wrap{position:relative;max-width:900px;width:100%;padding:20px;}
#hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
#ttl{font-size:13px;color:#aaa;}
#cnt{font-size:12px;color:#666;margin-left:8px;}
#xbtn{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;}
#imgbox{position:relative;display:flex;align-items:center;justify-content:center;}
#mainimg{max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px;display:block;}
.arr{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);border-radius:50%;font-size:24px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.arr:hover{background:rgba(255,255,255,.3);}
#prev{left:-60px;}#nxt{right:-60px;}
#thumbs{display:flex;gap:8px;justify-content:center;margin-top:14px;overflow-x:auto;padding:4px 0;}
.th{flex-shrink:0;width:56px;height:70px;border-radius:5px;overflow:hidden;cursor:pointer;border:2px solid transparent;opacity:.5;transition:all .18s;}
.th.on{border-color:#FF6B1A;opacity:1;}
.th img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
@media(max-width:600px){#prev{left:0;}#nxt{right:0;}.arr{width:36px;height:36px;font-size:18px;}}
</style>
</head>
<body>
<div id="wrap">
  <div id="hdr">
    <div><span id="ttl"></span><span id="cnt"></span></div>
    <button id="xbtn" onclick="window.close()">✕</button>
  </div>
  <div id="imgbox">
    <button class="arr" id="prev">&#8249;</button>
    <button class="arr" id="nxt">&#8250;</button>
    <img id="mainimg" src="" alt="">
  </div>
  <div id="thumbs"></div>
</div>
<script>
var imgs=[],si=0;
try{
  var raw=location.hash.slice(1);
  var d=JSON.parse(decodeURIComponent(raw));
  imgs=d.imgs||(d.src?[d.src]:[]);
  document.getElementById('ttl').textContent=d.cap||'';
  document.getElementById('cnt').textContent=d.total?'('+(d.idx+1)+' / '+d.total+')':'';
  var th=document.getElementById('thumbs');
  if(imgs.length>1){
    th.innerHTML=imgs.map(function(url,i){
      return '<div class="th'+(i===0?' on':'')+'" data-i="'+i+'"><img src="'+url+'"></div>';
    }).join('');
    th.querySelectorAll('.th').forEach(function(t){
      t.onclick=function(){show(parseInt(t.dataset.i));};
    });
  }
  show(0);
}catch(e){}
function show(n){
  si=((n%imgs.length)+imgs.length)%imgs.length;
  document.getElementById('mainimg').src=imgs[si];
  document.querySelectorAll('.th').forEach(function(t,i){t.classList.toggle('on',i===si);});
}
document.getElementById('prev').onclick=function(){show(si-1);};
document.getElementById('nxt').onclick=function(){show(si+1);};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft')show(si-1);
  if(e.key==='ArrowRight')show(si+1);
  if(e.key==='Escape')window.close();
});
</script>
</body>
</html>
