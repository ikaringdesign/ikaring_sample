<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이미지 보기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;}
#modal{background:#fff;border-radius:12px;overflow:hidden;width:min(96vw,1400px);max-height:96vh;display:flex;flex-direction:column;box-shadow:0 32px 100px rgba(0,0,0,.4);}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
#info{display:flex;align-items:center;gap:8px;}
#ttl{font-size:14px;font-weight:600;color:#222;}
#cnt{font-size:12px;color:#aaa;}
#xbtn{width:30px;height:30px;border-radius:50%;border:none;background:#f0f0f0;font-size:17px;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#imgwrap{position:relative;background:#111;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#mainimg{max-width:100%;max-height:90vh;object-fit:contain;display:block;}
.arr{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;font-size:26px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#prev{left:14px;}#nxt{right:14px;}
#ftr{padding:14px 18px;border-top:1px solid #f0f0f0;background:#fafafa;flex-shrink:0;}
#thumbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
.th{flex-shrink:0;width:52px;height:65px;border-radius:4px;overflow:hidden;cursor:pointer;border:2px solid transparent;opacity:.5;transition:all .18s;}
.th.on{border-color:#FF6B1A;opacity:1;}
.th img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
</style>
</head>
<body>
<div id="modal">
  <div id="hdr">
    <div id="info"><span id="ttl"></span><span id="cnt"></span></div>
    <button id="xbtn" onclick="window.close()">&#x2715;</button>
  </div>
  <div id="imgwrap">
    <img id="mainimg" src="" alt="">
  </div>
  <div id="ftr"><div id="thumbs"></div></div>
</div>
<script>
var imgs=[],si=0;
try{
  var d=JSON.parse(decodeURIComponent(location.hash.slice(1)));
  imgs=d.imgs||(d.src?[d.src]:[]);
  document.getElementById('ttl').textContent=d.cap||'';
  document.getElementById('cnt').textContent=d.total?'('+(d.idx+1)+' / '+d.total+')':'';

  // 화살표: 서브이미지 있을 때만
  if(imgs.length>1){
    var wrap=document.getElementById('imgwrap');
    var prev=document.createElement('button'); prev.className='arr'; prev.id='prev'; prev.innerHTML='&#8249;';
    var nxt=document.createElement('button'); nxt.className='arr'; nxt.id='nxt'; nxt.innerHTML='&#8250;';
    wrap.appendChild(prev); wrap.appendChild(nxt);
    prev.onclick=function(){show(si-1);};
    nxt.onclick=function(){show(si+1);};

    var th=document.getElementById('thumbs');
    th.innerHTML=imgs.map(function(url,i){
      return '<div class="th'+(i===0?' on':'')+'" data-i="'+i+'"><img src="'+url+'"></div>';
    }).join('');
    th.querySelectorAll('.th').forEach(function(t){t.onclick=function(){show(parseInt(t.dataset.i));};});
    document.getElementById('ftr').style.display='block';
  } else {
    document.getElementById('ftr').style.display='none';
  }
  show(0);
}catch(e){}
function show(n){
  si=((n%imgs.length)+imgs.length)%imgs.length;
  document.getElementById('mainimg').src=imgs[si];
  document.querySelectorAll('.th').forEach(function(t,i){t.classList.toggle('on',i===si);});
}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'&&imgs.length>1)show(si-1);
  if(e.key==='ArrowRight'&&imgs.length>1)show(si+1);
  if(e.key==='Escape')window.close();
});
</script>
</body>
</html>
