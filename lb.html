<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lb</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  background:transparent;
  overflow:hidden;
  /* 닫혀있을 때 클릭 아래 iframe으로 통과 */
  pointer-events:none;
}
#ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;justify-content:center;
  padding:20px;
  /* 열렸을 때만 클릭 활성화 */
  pointer-events:auto;
}
#ov.on{display:flex;}
#modal{
  position:relative;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  width:100%;
  max-width:820px;
  max-height:94vh;
  display:flex;
  flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:pop .2s ease;
}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid #f0f0f0;flex-shrink:0;
  font-family:'Noto Sans KR',sans-serif;
}
#info{display:flex;align-items:center;gap:8px;}
#ttl{font-size:13px;font-weight:600;color:#222;}
#cnt{font-size:12px;color:#aaa;}
#xbtn{
  width:28px;height:28px;border-radius:50%;
  border:none;background:#f4f4f4;font-size:16px;color:#555;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#xbtn:hover{background:#e8e8e8;}
#imgarea{
  position:relative;background:#111;
  flex:1;min-height:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#mainimg{
  max-width:100%;max-height:68vh;
  object-fit:contain;display:block;
}
.arr{
  position:absolute;top:50%;transform:translateY(-50%);
  width:40px;height:40px;
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.25);
  border-radius:50%;font-size:22px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;transition:background .15s;
}
.arr:hover{background:rgba(255,255,255,.3);}
#prev{left:12px;} #nxt{right:12px;}
#ftr{
  padding:12px 16px;border-top:1px solid #f0f0f0;
  background:#fafafa;flex-shrink:0;
}
#thumbs{
  display:flex;gap:8px;
  overflow-x:auto;scrollbar-width:thin;
  padding-bottom:2px;
}
.thumb{
  flex-shrink:0;width:52px;height:65px;
  border-radius:4px;overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;opacity:.5;
  transition:all .18s;
}
.thumb.on{border-color:#FF6B1A;opacity:1;}
.thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
</style>
</head>
<body>
<div id="ov">
  <div id="modal">
    <div id="hdr">
      <div id="info">
        <span id="ttl"></span>
        <span id="cnt"></span>
      </div>
      <button id="xbtn">✕</button>
    </div>
    <div id="imgarea">
      <button class="arr" id="prev">&#8249;</button>
      <button class="arr" id="nxt">&#8250;</button>
      <img id="mainimg" src="" alt="">
    </div>
    <div id="ftr">
      <div id="thumbs"></div>
    </div>
  </div>
</div>

<script>
var imgs=[], si=0, lbIdx=0, lbTotal=0;
var lastKey='';

/* localStorage 폴링 100ms */
setInterval(function(){
  try{
    var raw=localStorage.getItem('aw-lb');
    if(!raw||raw===lastKey)return;
    lastKey=raw;
    var d=JSON.parse(raw);
    if(!d)return;
    if(d.type==='aw-lb-open')openLB(d);
    if(d.type==='aw-lb-close')closeLB();
  }catch(e){}
},100);

/* storage event (다른 탭/iframe에서 쓸 때) */
window.addEventListener('storage',function(e){
  if(e.key!=='aw-lb')return;
  try{
    var d=JSON.parse(e.newValue);
    if(!d)return;
    if(d.type==='aw-lb-open')openLB(d);
    if(d.type==='aw-lb-close')closeLB();
  }catch(e){}
});

function openLB(d){
  imgs=d.imgs||(d.src?[d.src]:[]);
  lbIdx=d.idx||0; lbTotal=d.total||1; si=0;
  document.getElementById('ttl').textContent=d.cap||'';
  document.getElementById('cnt').textContent='('+(lbIdx+1)+' / '+lbTotal+')';
  var th=document.getElementById('thumbs');
  if(imgs.length>1){
    th.innerHTML=imgs.map(function(url,i){
      return '<div class="thumb'+(i===0?' on':'')+'" data-i="'+i+'"><img src="'+url+'" loading="lazy"></div>';
    }).join('');
    th.querySelectorAll('.thumb').forEach(function(t){
      t.onclick=function(){showImg(parseInt(t.dataset.i));};
    });
    document.getElementById('ftr').style.display='block';
  }else{
    th.innerHTML='';
    document.getElementById('ftr').style.display='none';
  }
  showImg(0);
  document.getElementById('ov').classList.add('on');
}

function closeLB(){
  document.getElementById('ov').classList.remove('on');
  document.getElementById('mainimg').src='';
  lastKey='';
}

function showImg(n){
  si=((n%imgs.length)+imgs.length)%imgs.length;
  document.getElementById('mainimg').src=imgs[si];
  document.querySelectorAll('.thumb').forEach(function(t,i){
    t.classList.toggle('on',i===si);
  });
}

document.getElementById('xbtn').onclick=closeLB;
document.getElementById('ov').onclick=function(e){if(e.target===this)closeLB();};
document.getElementById('prev').onclick=function(){showImg(si-1);};
document.getElementById('nxt').onclick=function(){showImg(si+1);};
document.addEventListener('keydown',function(e){
  if(!document.getElementById('ov').classList.contains('on'))return;
  if(e.key==='Escape')closeLB();
  if(e.key==='ArrowLeft')showImg(si-1);
  if(e.key==='ArrowRight')showImg(si+1);
});
</script>
</body>
</html>
