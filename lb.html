<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lb</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:rgba(0,0,0,.55);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
#wrap{position:relative;max-width:1400px;width:100%;}
#xbtn{
  position:fixed;top:16px;right:20px;
  width:36px;height:36px;border-radius:50%;
  border:none;background:rgba(255,255,255,.15);
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#mainimg{
  width:100%;max-height:88vh;
  object-fit:contain;display:block;
  border-radius:6px;
}
#prev,#nxt{
  position:fixed;top:50%;transform:translateY(-50%);
  width:44px;height:44px;
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.3);
  border-radius:50%;font-size:26px;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
#prev{left:16px;}#nxt{right:16px;}
#thumbs{
  display:flex;gap:8px;justify-content:center;
  margin-top:14px;overflow-x:auto;padding:4px 0;
}
.th{
  flex-shrink:0;width:56px;height:70px;
  border-radius:5px;overflow:hidden;
  cursor:pointer;border:2px solid transparent;
  opacity:.5;transition:all .18s;
}
.th.on{border-color:#FF6B1A;opacity:1;}
.th img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
</style>
</head>
<body>
<button id="xbtn" onclick="window.close()">&#x2715;</button>
<div id="wrap">
  <img id="mainimg" src="" alt="">
  <div id="thumbs"></div>
</div>
<script>
var imgs=[],si=0;
try{
  var d=JSON.parse(decodeURIComponent(location.hash.slice(1)));
  imgs=d.imgs||(d.src?[d.src]:[]);
  document.getElementById('mainimg').src=imgs[0];

  if(imgs.length>1){
    /* 화살표 */
    var prev=document.createElement('button'); prev.id='prev'; prev.innerHTML='&#8249;';
    var nxt=document.createElement('button'); nxt.id='nxt'; nxt.innerHTML='&#8250;';
    document.body.appendChild(prev); document.body.appendChild(nxt);
    prev.onclick=function(){show(si-1);};
    nxt.onclick=function(){show(si+1);};
    /* 썸네일 */
    var th=document.getElementById('thumbs');
    th.innerHTML=imgs.map(function(url,i){
      return '<div class="th'+(i===0?' on':'')+'" data-i="'+i+'"><img src="'+url+'"></div>';
    }).join('');
    th.querySelectorAll('.th').forEach(function(t){
      t.onclick=function(){show(parseInt(t.dataset.i));};
    });
  }
}catch(e){}

function show(n){
  si=((n%imgs.length)+imgs.length)%imgs.length;
  document.getElementById('mainimg').src=imgs[si];
  document.querySelectorAll('.th').forEach(function(t,i){t.classList.toggle('on',i===si);});
}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'&&imgs.length>1) show(si-1);
  if(e.key==='ArrowRight'&&imgs.length>1) show(si+1);
  if(e.key==='Escape') window.close();
});
document.body.addEventListener('click',function(e){
  if(e.target===document.body) window.close();
});
</script>
</body>
</html>
