<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이미지 보기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  background:#111;
  overflow:hidden;
  font-family:'Noto Sans KR',sans-serif;
}

/* 로딩 */
#loading{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#111;color:#666;font-size:14px;
  flex-direction:column;gap:14px;
}
.spin{
  width:32px;height:32px;
  border:3px solid #333;border-top-color:#FF6B1A;
  border-radius:50%;animation:sp .7s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg);}}

/* 메인 */
#lb-wrap{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:#111;
}

/* 헤더 */
#lb-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  background:#1a1a1a;
  border-bottom:1px solid #2a2a2a;
  flex-shrink:0;
}
#lb-cap{font-size:13px;font-weight:600;color:#ddd;}
#lb-cnt{font-size:12px;color:#666;margin-left:10px;}
#lb-close{
  padding:6px 16px;
  background:#333;color:#ccc;
  border:none;border-radius:4px;
  font-size:13px;cursor:pointer;
  transition:background .15s;
}
#lb-close:hover{background:#444;color:#fff;}

/* 이미지 영역 */
#lb-img-area{
  flex:1;min-height:0;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#lb-img{
  max-width:100%;max-height:100%;
  object-fit:contain;display:block;
}

/* 화살표 */
.lb-arr{
  position:absolute;top:50%;transform:translateY(-50%);
  width:44px;height:44px;
  background:rgba(255,255,255,.12);
  border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;
  font-size:24px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;
  transition:background .15s;
}
.lb-arr:hover{background:rgba(255,255,255,.25);}
#lb-prev{left:16px;} #lb-next{right:16px;}

/* 썸네일 */
#lb-ftr{
  padding:10px 16px;
  background:#1a1a1a;
  border-top:1px solid #2a2a2a;
  flex-shrink:0;
}
#lb-thumbs{
  display:flex;gap:8px;
  overflow-x:auto;
  scrollbar-width:thin;
  scrollbar-color:#444 transparent;
  padding-bottom:2px;
}
.lb-thumb{
  flex-shrink:0;width:56px;height:56px;
  border-radius:4px;overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;
  opacity:.45;
  transition:all .18s;
}
.lb-thumb.on{border-color:#FF6B1A;opacity:1;}
.lb-thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}

/* 키보드 힌트 */
#lb-hint{
  text-align:center;
  font-size:11.5px;color:#444;
  padding:6px 0 8px;
  background:#1a1a1a;
  flex-shrink:0;
}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><span>불러오는 중…</span></div>

<div id="lb-wrap" style="display:none;">
  <div id="lb-hdr">
    <div style="display:flex;align-items:center;">
      <span id="lb-cap"></span>
      <span id="lb-cnt"></span>
    </div>
    <button id="lb-close">✕ 닫기</button>
  </div>
  <div id="lb-img-area">
    <button class="lb-arr" id="lb-prev">&#8249;</button>
    <button class="lb-arr" id="lb-next">&#8250;</button>
    <img id="lb-img" src="" alt="">
  </div>
  <div id="lb-ftr">
    <div id="lb-thumbs"></div>
  </div>
  <div id="lb-hint">← → 키로 이동 &nbsp;|&nbsp; ESC 닫기</div>
</div>

<script>
var imgs = [], si = 0, lbIdx = 0, lbTotal = 0;

// URL hash에서 데이터 읽기
function init(){
  try{
    var hash = decodeURIComponent(location.hash.slice(1));
    var d = JSON.parse(hash);
    imgs    = d.imgs  || [];
    lbIdx   = d.idx   || 0;
    lbTotal = d.total || 1;
    var cap = d.cap   || '';

    if(!imgs.length){ showError('이미지 정보가 없습니다'); return; }

    document.getElementById('lb-cap').textContent = cap;
    document.getElementById('lb-cnt').textContent = ' (' + (lbIdx+1) + ' / ' + lbTotal + ')';

    // 썸네일 생성
    var th = document.getElementById('lb-thumbs');
    if(imgs.length > 1){
      th.innerHTML = imgs.map(function(url, i){
        return '<div class="lb-thumb' + (i===0?' on':'') + '" data-i="' + i + '">' +
               '<img src="' + url + '" loading="lazy"></div>';
      }).join('');
      th.querySelectorAll('.lb-thumb').forEach(function(t){
        t.onclick = function(){ showImg(parseInt(t.dataset.i)); };
      });
      document.getElementById('lb-ftr').style.display = 'block';
    } else {
      document.getElementById('lb-ftr').style.display = 'none';
    }

    showImg(0);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('lb-wrap').style.display  = 'flex';

  } catch(e){
    showError('데이터를 읽을 수 없습니다: ' + e.message);
  }
}

function showImg(n){
  si = ((n % imgs.length) + imgs.length) % imgs.length;
  var img = document.getElementById('lb-img');
  img.src = '';
  img.src = imgs[si];
  document.querySelectorAll('.lb-thumb').forEach(function(t, i){
    t.classList.toggle('on', i===si);
  });
}

function showError(msg){
  document.getElementById('loading').innerHTML =
    '<div style="color:#666;font-size:14px;">' + msg + '</div>';
}

document.getElementById('lb-close').onclick = function(){ window.close(); };
document.getElementById('lb-prev').onclick   = function(){ showImg(si-1); };
document.getElementById('lb-next').onclick   = function(){ showImg(si+1); };
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape')      window.close();
  if(e.key === 'ArrowLeft')   showImg(si-1);
  if(e.key === 'ArrowRight')  showImg(si+1);
});

// 시작
init();
</script>
</body>
</html>
