<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lb</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:transparent;}
body{
  width:100vw;height:100vh;
  background:transparent;
  overflow:hidden;
  pointer-events:none;
}
#lb-ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.88);
  display:none;
  align-items:center;justify-content:center;
  padding:20px;
  pointer-events:auto;
}
#lb-ov.open{display:flex;}
#lb-modal{
  position:relative;background:#fff;border-radius:10px;overflow:hidden;
  max-width:820px;width:100%;max-height:94vh;
  display:flex;flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
  animation:lbIn .2s ease;
}
@keyframes lbIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
#lb-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid #f0f0f0;flex-shrink:0;
}
#lb-info{display:flex;align-items:center;gap:8px;font-family:sans-serif;}
#lb-ttl{font-size:13px;font-weight:600;color:#222;}
#lb-cnt{font-size:12px;color:#aaa;}
#lb-x{
  width:28px;height:28px;border-radius:50%;border:none;
  background:#f4f4f4;font-size:16px;color:#555;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#lb-x:hover{background:#e8e8e8;}
#lb-img-area{
  position:relative;background:#111;flex:1;min-height:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
#lb-img{max-width:100%;max-height:68vh;object-fit:contain;display:block;}
.lb-arr{
  position:absolute;top:50%;transform:translateY(-50%);
  width:40px;height:40px;
  background:rgba(255,255,255,.14);
  border:1.5px solid rgba(255,255,255,.22);
  border-radius:50%;font-size:22px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;
}
.lb-arr:hover{background:rgba(255,255,255,.28);}
#lb-prev{left:12px;} #lb-next{right:12px;}
#lb-ftr{padding:12px 16px;border-top:1px solid #f0f0f0;background:#fafafa;flex-shrink:0;}
#lb-thumbs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:thin;padding-bottom:2px;}
.lb-thumb{
  flex-shrink:0;width:50px;height:62px;border-radius:4px;overflow:hidden;
  cursor:pointer;border:2px solid transparent;opacity:.5;transition:all .18s;
}
.lb-thumb.on{border-color:#FF6B1A;opacity:1;}
.lb-thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
</style>
</head>
<body>
<div id="lb-ov">
  <div id="lb-modal">
    <div id="lb-hdr">
      <div id="lb-info">
        <span id="lb-ttl"></span>
        <span id="lb-cnt"></span>
      </div>
      <button id="lb-x">✕</button>
    </div>
    <div id="lb-img-area">
      <button class="lb-arr" id="lb-prev">&#8249;</button>
      <button class="lb-arr" id="lb-next">&#8250;</button>
      <img id="lb-img" src="" alt="">
    </div>
    <div id="lb-ftr">
      <div id="lb-thumbs"></div>
    </div>
  </div>
</div>
<script>
let imgs=[],subIdx=0,lbIdx=0,lbTotal=0;

/* localStorage storage 이벤트 수신 */
window.addEventListener('storage', function(e){
  if(e.key !== 'aw-lb') return;
  try{
    const d = JSON.parse(e.newValue);
    if(!d) return;
    if(d.type === 'aw-lb-open')  openLB(d);
    if(d.type === 'aw-lb-close') closeLB();
  }catch(err){}
});

/* 같은 탭에서도 처리되도록 폴링 (storage 이벤트는 같은 탭엔 안 발생) */
let _lastVal = '';
setInterval(function(){
  try{
    const raw = localStorage.getItem('aw-lb');
    if(!raw || raw === _lastVal) return;
    _lastVal = raw;
    const d = JSON.parse(raw);
    if(!d) return;
    if(d.type === 'aw-lb-open')  openLB(d);
    if(d.type === 'aw-lb-close') closeLB();
  }catch(err){}
}, 100);

function openLB(d){
  imgs    = d.imgs || (d.src ? [d.src] : []);
  lbIdx   = d.idx   || 0;
  lbTotal = d.total || 1;
  subIdx  = 0;

  document.getElementById('lb-ttl').textContent = d.cap || '';
  document.getElementById('lb-cnt').textContent = '(' + (lbIdx+1) + ' / ' + lbTotal + ')';

  const th = document.getElementById('lb-thumbs');
  if(imgs.length > 1){
    th.innerHTML = imgs.map((url,i)=>
      `<div class="lb-thumb${i===0?' on':''}" data-si="${i}">
         <img src="${url}" alt="" loading="lazy">
       </div>`
    ).join('');
    th.querySelectorAll('.lb-thumb').forEach(t=>{
      t.onclick = ()=>showSub(parseInt(t.dataset.si));
    });
    document.getElementById('lb-ftr').style.display='block';
  } else {
    th.innerHTML='';
    document.getElementById('lb-ftr').style.display='none';
  }
  showSub(0);
  document.getElementById('lb-ov').classList.add('open');
}

function closeLB(){
  document.getElementById('lb-ov').classList.remove('open');
  document.getElementById('lb-img').src='';
  _lastVal = '';
}

function showSub(n){
  subIdx = ((n % imgs.length) + imgs.length) % imgs.length;
  document.getElementById('lb-img').src = imgs[subIdx];
  document.querySelectorAll('.lb-thumb').forEach((t,i)=>t.classList.toggle('on',i===subIdx));
}

document.getElementById('lb-x').onclick = closeLB;
document.getElementById('lb-ov').onclick = function(e){ if(e.target===this) closeLB(); };
document.getElementById('lb-prev').onclick = ()=>showSub(subIdx-1);
document.getElementById('lb-next').onclick = ()=>showSub(subIdx+1);
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lb-ov').classList.contains('open')) return;
  if(e.key==='Escape')     closeLB();
  if(e.key==='ArrowLeft')  showSub(subIdx-1);
  if(e.key==='ArrowRight') showSub(subIdx+1);
});
</script>
</body>
</html>
